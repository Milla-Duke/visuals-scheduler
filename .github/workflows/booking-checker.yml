name: Booking Checker

on:
  schedule:
    - cron: '*/2 * * * 1-5'
  repository_dispatch:
    types: [booking-received]
  workflow_dispatch:

concurrency:
  group: booking-checker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-bookings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore processed bookings cache
        uses: actions/cache@v4
        with:
          path: processed_bookings.json
          key: processed-bookings-${{ github.run_id }}
          restore-keys: processed-bookings-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests dateparser pytz

      - name: Run booking checker
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
        run: python booking_to_teamup.py

      - name: Save processed bookings cache
        uses: actions/cache@v4
        with:
          path: processed_bookings.json
          key: processed-bookings-${{ github.run_id }}

      - name: Merge and commit processed_bookings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          python3 merge_bookings.py
          git add processed_bookings.json
          git diff --staged --quiet || git commit -m "Update processed_bookings.json [skip ci]"
          git push origin HEAD:main
