name: Visuals Daily Draft

on:
  schedule:
    # 5:45pm NZST (UTC+12) = 05:45 UTC  — runs April–September
    - cron: '45 5 * * 1-5'
    # 5:45pm NZDT (UTC+13) = 04:45 UTC  — runs October–March
    - cron: '45 4 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub

jobs:
  post-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily draft
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
        run: python visuals_daily_draft.py
