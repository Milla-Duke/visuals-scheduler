name: Monday Draft

on:
  # Manual trigger from the GitHub Actions tab — click "Run workflow"
  workflow_dispatch:

  # Fired by cron-job.org via /api/trigger when /visuals-update monday
  # sets the pending_monday_draft Redis flag.
  repository_dispatch:
    types: [monday-draft-trigger]

jobs:
  post-monday-draft:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Post Monday's draft to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
        run: python visuals_monday_draft.py
