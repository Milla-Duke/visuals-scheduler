name: Today's Jobs
 
on:
  # Manual trigger from the GitHub Actions tab — click "Run workflow"
  workflow_dispatch:
 
  # Also fireable by the Cloudflare Worker slash command (future)
  repository_dispatch:
    types: [todays-jobs-trigger]
 
jobs:
  post-todays-jobs:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Post today's jobs to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
        run: python visuals_today.py
 
