name: Assignment Notifier

on:
  workflow_dispatch:
  repository_dispatch:
    types: [assignment-notifier-trigger]

concurrency:
  group: assignment-notifier
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify-assignments:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run assignment notifier
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
        run: python assignment_notifier.py

      - name: Commit processed_bookings.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_bookings.json
          git diff --staged --quiet || git commit -m "Update processed_bookings.json [skip ci]"
          git push origin HEAD:main
